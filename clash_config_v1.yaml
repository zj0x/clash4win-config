    lazy: true
    filter: (?i)(еҸ°ж№ҫ|еҸ°|TWN|Taiwan|Taipei)

  - name: JP Auto
    type: url-test
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png
