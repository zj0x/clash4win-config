port: 7890
socks-port: 7891
mixed-port: 7892
ipv6: false
allow-lan: false
mode: rule
log-level: info
unified-delay: true
external-controller: 127.0.0.1:9090
secret: "oekx*Z!loy"
tcp-concurrent: true
keep-alive-interval: 30
tcp-no-delay: true
find-process-mode: strict
global-client-fingerprint: chrome

# --- Meta Geo ж•°жҚ® ---
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat
  geosite: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat
  asn: https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb

profile:
  store-selected: true
  store-fake-ip: true

# --- е—…жҺўеҷЁдјҳеҢ– ---
sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
      override-destination: true
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "dns.alidns.com"
    - "doh.pub"
    - "+.apple.com"
    - "223.5.5.5"
    - "119.29.29.29"

# --- Tun жЁЎејҸ ---
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  mtu: 1400

# --- DNS и®ҫзҪ® (йҖҹеәҰж ёеҝғ) ---
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  prefer-h3: true
  optimistic-cache: true
  cache-algorithm: arc

  fake-ip-filter:
    # --- еұҖеҹҹзҪ‘дёҺжң¬ең°дё»жңә ---
    - "+.lan"
    - "+.local"
    - "localhost.ptlogin2.qq.com"

    # --- Windows иҝһжҺҘжҖ§жЈҖжҹҘ (йҳІжӯўжҳҫзӨәж— зҪ‘з»ң) ---
    - "msftconnecttest.com"
    - "msftncsi.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

    # --- NTP ж—¶й—ҙеҗҢжӯҘжңҚеҠЎ (йҳІжӯўж—¶й—ҙж ЎеҮҶеӨұиҙҘ) ---
    - "+.pool.ntp.org"
    - "+.ntp.org.cn"
    - "+.time.edu.cn"
  
  use-hosts: true
  use-system-hosts: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # дјҳеҢ–пјҡеҲ йҷӨдәҶдёҺ policy еҶІзӘҒзҡ„ fallback жЁЎеқ—

  nameserver-policy:
    "rule-set:Gemini":
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query
    "domain:aistudio.google.com":
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query
    "domain-suffix:generativelanguage.googleapis.com":
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query
    "domain:robinfrontend-pa.googleapis.com":
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query
      - https://1.1.1.1/dns-query
    "+.":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

# --- д»ЈзҗҶжҸҗдҫӣе•Ҷ ---
proxy-providers:
  жҲ‘зҡ„иҠӮзӮ№:
    type: http
    url: "https://example.com/replace-me"
    interval: 3600
    path: ./providers/my-nodes.yaml
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 150
      lazy: true
    override:
      udp: true

# --- и§„еҲҷйӣҶ ---
rule-providers:
  Adobe:
    type: http
    behavior: classical
    path: ./ruleset/Adobe.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Adobe/Adobe.yaml
    interval: 86400
  OpenAI:
    type: http
    behavior: classical
    path: ./ruleset/OpenAI_No_Resolve.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI_No_Resolve.yaml
    interval: 86400
  Claude:
    type: http
    behavior: classical
    path: ./ruleset/Claude_No_Resolve.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude_No_Resolve.yaml
    interval: 86400
  Gemini:
    type: http
    behavior: classical
    path: ./ruleset/Gemini.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
    interval: 86400
  Copilot:
    type: http
    behavior: classical
    path: ./ruleset/Copilot.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.yaml
    interval: 86400

# --- зӯ–з•Ҙз»„ ---
proxy-groups:
  - name: Proxy
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
    proxies:
      - жүӢеҠЁеҲҮжҚў
      - HK Auto
      - TW Auto
      - JP Auto
      - SG Auto
      - US Auto
      - UK Auto
      - DE Auto
      - NL Auto
      - DIRECT
    use:
      - жҲ‘зҡ„иҠӮзӮ№

  - name: AI
    type: select
    icon: https://fastly.jsdelivr.net/gh/Orz-3/mini@master/Color/OpenAI.png
    proxies:
      - жүӢеҠЁеҲҮжҚў
      - US Auto
      - SG Auto
      - JP Auto
      - UK Auto
      - DE Auto
    use:
      - жҲ‘зҡ„иҠӮзӮ№

  - name: жүӢеҠЁеҲҮжҚў
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Static.png
    use:
      - жҲ‘зҡ„иҠӮзӮ№

  - name: YouTube
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
    proxies:
      - SG Auto
      - HK Auto
      - TW Auto
      - JP Auto
      - US Auto
      - UK Auto
      - DE Auto
      - NL Auto
      - жүӢеҠЁеҲҮжҚў
    use:
      - жҲ‘зҡ„иҠӮзӮ№

  - name: Google
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Google_Search.png
    proxies:
      - SG Auto
      - HK Auto
      - JP Auto
      - US Auto
      - UK Auto
      - DE Auto
      - жүӢеҠЁеҲҮжҚў
    use:
      - жҲ‘зҡ„иҠӮзӮ№

  - name: GitHub
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png
    proxies:
      - US Auto
