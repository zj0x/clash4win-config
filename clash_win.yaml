    interval: 300
    tolerance: 50

  - name: "日本Auto"
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    use:
      - MyAirport
    filter: "(?i)(JP|Japan|日本|JPN|Tokyo|Osaka)"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "新加坡Auto"
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    use:
      - MyAirport
    filter: "(?i)(SG|Singapore|新加坡|SGP)"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "美国Auto"
