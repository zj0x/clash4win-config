# ─── 规则提供者 ────────────────────────────────────────────
# 仅保留 GEOSITE 无法覆盖的特殊规则集，其余全部用内置 GEOSITE 替代
# 优势：减少启动下载数、加快匹配速度、降低维护成本
rule-providers:

  # AI 服务（覆盖 OpenAI / Claude / Gemini / Copilot / Perplexity 等）
  # GEOSITE 的 openai 分类不够全面，使用第三方维护的综合列表
  ai_service:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/EAlyce/conf/refs/heads/main/Rule/OpenAI.list"
    path: ./ruleset/ai_service.list
    interval: 86400

  # Adobe 正版验证屏蔽
  adobe_block:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/ignaciocastro/a-dove-is-dumb/refs/heads/main/clash.yaml"
    path: ./ruleset/adobe_block.yaml
    interval: 86400

  # Apple 国内 CDN（确保 Apple 中国服务走最快的国内节点）
  sukka_apple_cn:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/Clash/non_ip/apple_cn.txt"
    path: ./ruleset/sukka_apple_cn.txt
    interval: 43200

  # Microsoft 国内 CDN
  sukka_microsoft_cdn:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/Clash/non_ip/microsoft_cdn.txt"
    path: ./ruleset/sukka_microsoft_cdn.txt
    interval: 43200

  # 大文件下载直连（Windows Update、驱动、IDE 等）
  sukka_download:
    type: http
    behavior: domain
    format: text
    url: "https://ruleset.skk.moe/Clash/domainset/download.txt"
    path: ./ruleset/sukka_download.txt
    interval: 43200

  # 本地应用进程直连
  loyalsoldier_applications:
    type: http
    behavior: classical
    format: text
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/loyalsoldier_applications.txt
    interval: 86400

# ─── 分流规则 ──────────────────────────────────────────────
# 匹配顺序：上→下，首次命中即停止
# 设计原则：进程 → 特殊直连 → 屏蔽 → 国内CDN → 代理服务 → GFW兜底
#           → Apple/Microsoft直连 → 国内域名 → 国内IP → 白名单兜底
rules:
  # ─① 本地应用直连（进程级，最先处理）─
  - RULE-SET,loyalsoldier_applications,DIRECT

  # ─② Dashboard 面板直连 ─
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - DOMAIN,d.metacubex.one,DIRECT

  # ─③ 私有网络 / 局域网 ─
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve

  # ─④ 屏蔽 ─
  - RULE-SET,adobe_block,REJECT

  # ─⑤ 国内 CDN / 下载加速（范围精确，安全前置）─
  - RULE-SET,sukka_apple_cn,DIRECT
  - RULE-SET,sukka_microsoft_cdn,DIRECT
  - RULE-SET,sukka_download,DIRECT
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,category-games@cn,DIRECT

  # ─⑥ 代理服务（细粒度 → 粗粒度）─
  - RULE-SET,ai_service,🧠 AI 服务
  - GEOSITE,openai,🧠 AI 服务
  - GEOSITE,youtube,📹 YouTube
  - GEOSITE,google,🔍 Google
  - GEOSITE,telegram,📲 Telegram
  - GEOSITE,github,🐙 GitHub
  - GEOSITE,twitter,🚀 节点选择
  - GEOSITE,category-scholar-!cn,🚀 节点选择
  - GEOSITE,reddit,🚀 节点选择

  # ─⑦ Apple & Microsoft 全球服务直连 ─
  # 中国可正常访问，默认直连；如需代理请使用 advanced 配置
  - GEOSITE,apple,DIRECT
  - GEOSITE,microsoft,DIRECT

  # ─⑧ GFW 域名兜底 ─
  - GEOSITE,gfw,🚀 节点选择

  # ─⑨ 国内域名 & IP 兜底 ─
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve

  # ─⑩ 最终兜底（白名单模式：未知流量 → 代理，确保安全）─
  - MATCH,🐟 漏网之鱼
