# Clash Verge Rev (Mihomo Kernel) Config
# 适配 Windows 平台 & 中国大陆网络环境
# 更新时间：2026-02

# ---------------------------------------------------
# 1. 基础监听与端口
# ---------------------------------------------------
port: 7890
socks-port: 7891
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# ---------------------------------------------------
# 2. Mihomo 核心性能参数
# ---------------------------------------------------
# 开启 HTTP/3 (QUIC) 支持，大幅降低握手延迟，抗丢包能力强
prefer-h3: true 

# 统一延迟计算，防止节点抖动
unified-delay: true

# TCP 并发连接，提高握手成功率
tcp-concurrent: true

# 保持连接活跃间隔 (秒)，配合 HTTP/3 防止连接中断
keep-alive-interval: 15

# 进程匹配模式，Windows下 strict 模式对规则匹配更精准
find-process-mode: strict

# GeoData 模式
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24

# ---------------------------------------------------
# 3. 流量嗅探 (Sniffer) - 解决 IP 直连应用的规则匹配问题
# ---------------------------------------------------
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    QUIC:
      ports: [443, 8443]
  # 强制不对以下域名进行嗅探（防止米哈游等游戏断流）
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
# ---------------------------------------------------
# 4. DNS 配置 (速度优化的核心)
# ---------------------------------------------------
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  
  # 模式选择
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # 缓存与性能 (Mihomo 专享)
  cache-algorithm: arc
  use-hosts: true             # 允许读取系统 hosts 文件
  respect-rules: true         # 遵循规则中的 DNS 设置 (配合 search domain)
  
  # 🔴 关键优化：指定代理节点本身域名的解析服务器
  # 防止代理节点域名被污染
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  
  # 默认 DNS (用于非策略组域名的解析兜底)
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    
  # 备用 DNS (当 DoH 失败时回退到 UDP，保证断网时也能恢复)
  fallback:
    - 223.5.5.5
    - 119.29.29.29
  
  # 🔴 策略分流 (Split DNS) - 这里的顺序和写法至关重要
  nameserver-policy:
    # 1. 所有的 Google 和 AI 服务，强制使用国外 DoH (防污染，且解析出离代理最近的 IP)
    "geosite:google,youtube,telegram,openai":
      - "https://1.1.1.1/dns-query#h3=true"
      - "https://8.8.8.8/dns-query#h3=true"
      
    # 2. 学术科研域名，强制走国外 DNS (防止被 GeoSite 误判为国内站点)
    "geosite:category-scholar-!cn,+.nature.com,+.science.org,+.sciencemag.org,+.rsc.org,+.acs.org,+.springer.com,+.springerlink.com,+.wiley.com,+.ieee.org,+.sciencedirect.com,+.elsevier.com,+.tandfonline.com,+.taylorandfrancis.com,+.cell.com,+.jstor.org,+.oxfordacademic.com,+.oup.com,+.cambridge.org,+.ncbi.nlm.nih.gov,+.arxiv.org,+.webofscience.com,+.scopus.com,+.researchgate.net,+.doi.org,+.pnas.org,+.aps.org,+.iop.org,+.mdpi.com,+.biorxiv.org,+.medrxiv.org,+.ssrn.com,+.annualreviews.org,+.royalsocietypublishing.org,+.plos.org,+.frontiersin.org,+.sagepub.com":
      - "https://1.1.1.1/dns-query#h3=true"
      - "https://8.8.8.8/dns-query#h3=true"
      
    # 3. 国外常用站点，走国外 DNS
    "geosite:geolocation-!cn":
      - "https://1.1.1.1/dns-query#h3=true"
      - "https://8.8.8.8/dns-query#h3=true"

    # 4. 国内域名，强制走国内 DNS (腾讯+阿里)
    "geosite:cn,private,apple,steam@cn":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query

  # 🔴 Fake-IP 过滤 (Windows 稳定性救星)
  # 以下域名不返回假 IP，而是返回真实 IP。
  # 解决 Windows 网络探测显示“无网络”、STUN 穿透失败、游戏联机失败等问题
  fake-ip-filter:
    - "*"  # 如果你发现某些局域网设备无法连接，可以保留这个通配符，但通常不建议
    - "+.lan"
    - "+.local"
    - "+.market.xboxcn.com"
    - "+.msftconnecttest.com" # Windows 网络连接探测
    - "+.msftncsi.com"        # Windows 网络连接探测
    - "msftconnecttest.com"
    - "msftncsi.com"
    - "+.battlenet.com.cn"    # 暴雪战网国服
    - "+.stun.*.*"            # STUN 穿透
    - "+.stun.*"
    - "stun.*.*"
    - "stun.*"
    - "+.ntp.org.cn"          # NTP 时间同步
    - "+.pool.ntp.org"

# ---------------------------------------------------
# 5. 代理提供者 (需填写您的订阅)
# ---------------------------------------------------
proxy-providers:
  MyAirport:
    type: http
    # 🔴🔴🔴 请在下方引号内填入你的机场订阅链接 🔴🔴🔴
    url: "https://example.com/api/v1/client/subscribe?token=YOUR_TOKEN"
    interval: 3600
    path: ./proxies/airport.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
    # 排除倍率过高或无效节点
    filter: "(?i)(HK|TW|JP|SG|US|DE|GB|NL|香港|台湾|日本|新加坡|美国|德国|英国|荷兰)"

# ---------------------------------------------------
# 6. 策略组 (保持原有逻辑，增加容错)
