      - MyAirport
    filter: "(?i)(United States|美国|USA)"

  # ============================================
  # 地区分组：自动测速组 (Url-Test)
  # ============================================
  - name: "香港Auto"
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    use:
      - MyAirport
    filter: "(?i)(HK|Hong Kong|香港|HKG)"
