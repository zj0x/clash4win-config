# ============================================================
# Clash Verge Rev 配置 (Mihomo 内核)
# 适配：Windows | 地区：中国大陆 | 模式：白名单
# 白名单逻辑：已知国内域名/IP → 直连，其余 → 代理（安全优先）
# 更新：2026-03-02
# ============================================================

# ─── 基础设置 ───────────────────────────────────────────────
mixed-port: 7890                    # HTTP + SOCKS5 混合端口
allow-lan: true                     # 允许局域网设备连接
bind-address: "*"                   # 监听所有网卡
mode: rule                          # 规则模式
log-level: info                     # 日志级别
ipv6: false                         # 关闭 IPv6（国内 IPv6 环境复杂，易泄漏）
external-controller: 127.0.0.1:9090 # 面板控制端口

# ─── 内核性能优化 ───────────────────────────────────────────
unified-delay: true                 # 统一延迟计算，结果更准确
tcp-concurrent: true                # TCP 并发连接，自动选最快
keep-alive-interval: 15             # 保活间隔(秒)，防 NAT 超时断连
find-process-mode: strict           # 精确进程匹配

# ─── GeoData 配置 ──────────────────────────────────────────
geodata-mode: true                  # 使用 .dat 格式（v2ray 兼容，更全）
geodata-loader: standard            # standard 全面兼容带特殊属性(@cn/!cn)的规则集
geo-auto-update: true               # 自动更新 GeoData
geo-update-interval: 24             # 更新间隔(小时)

# GeoData 下载源（使用 GitHub Releases，国内访问可能较慢）
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# ─── 持久化 ────────────────────────────────────────────────
profile:
  store-selected: true              # 记住策略组手动选择
  store-fake-ip: true               # 缓存 Fake-IP 映射，重启不丢失

# ─── TUN 虚拟网卡（接管全部系统流量）─────────────────────────
tun:
  enable: true
  stack: system                     # system 纯净栈，Windows 下性能远强于 mixed 和 gVisor
  dns-hijack:
    - "any:53"                      # 劫持所有 DNS（UDP），防止泄漏
    - "tcp://any:53"                # 劫持 TCP DNS，防止绕过
  auto-route: true
  auto-detect-interface: true
  mtu: 1500
  strict-route: true                # 严格路由，防流量绕过 TUN
  endpoint-independent-nat: true    # 改善 NAT 穿透（游戏、语音）

# ─── 流量嗅探 ──────────────────────────────────────────────
# 嗅探 TLS/HTTP/QUIC 中的域名，辅助分流（解决纯 IP 连接分流失败）
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ─── DNS 配置（核心防污染）─────────────────────────────────
# 策略：fake-ip + respect-rules
#   • 国内域名 → 国内 DoH 解析 → 直连
#   • 被墙域名 → 返回 fake-ip → 由代理远端解析（零 DNS 泄漏）
#   • 无需配置海外 DNS：fake-ip 模式下被墙域名根本不走本地 DNS
dns:
  enable: true
  #prefer-h3: false                  # ⚠️ 官方文档：强烈不建议与 respect-rules 同时启用
  listen: 127.0.0.1:1053
  ipv6: false

  # 模式
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # 性能
  cache-algorithm: arc              # ARC 缓存，命中率优于 LRU
  use-hosts: true
  use-system-hosts: true
  respect-rules: true               # DNS 解析遵循分流规则

  # 引导 DNS（纯 IP，解析 DoH 域名本身，打破鸡生蛋问题）
  default-nameserver:
    - 223.5.5.5                     # 阿里 DNS
    - 119.29.29.29                  # 腾讯 DNSPod

  # 代理节点域名解析（DoH 加密，防止 ISP 嗅探节点域名）
  # 仅在启动/切换节点时触发，DoH 延迟影响可忽略
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # 直连域名解析（匹配直连规则的域名用系统 DNS 重新解析）
  # 确保 CDN 就近调度，获取运营商最优 IP
  direct-nameserver:
    - system
  direct-nameserver-follow-policy: true

  # 主 DNS（未命中 nameserver-policy 的域名使用）
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # 域名策略 DNS — 国内域名走国内 DoH（加密 + 低延迟）
  # 被墙域名无需配置：fake-ip 直接返回假 IP，由代理远端解析
  nameserver-policy:
    "geosite:cn,private,apple-cn,apple@cn,steam@cn,category-games@cn":
      - https://223.5.5.5/dns-query
      - https://119.29.29.29/dns-query

  # Fake-IP 过滤（以下域名返回真实 IP，不走 fake-ip）
  # 解决：Windows "无网络"图标、STUN 穿透、游戏联机、NTP 等问题
  fake-ip-filter:
    # Windows 网络探测
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "dns.msftncsi.com"
    # NTP 时间同步
    - "+.ntp.org.cn"
    - "+.pool.ntp.org"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "ntp.*.com"
    # 局域网 / 本地
    - "+.lan"
    - "+.local"
    - "+.localhost"
    # STUN / NAT 穿透 / WebRTC
    - "+.stun.*.*"
    - "+.stun.*"
    - "stun.*.*"
    - "stun.*"
    - "+.turn.twilio.com"
    # QQ 登录
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    # 网易云音乐（需要真实 IP 才能正常播放）
    - "+.music.163.com"
    - "music.126.net"
    # 游戏平台
    - "+.battlenet.com.cn"
    - "+.logon.battlenet.com.cn"
    - "+.logon.battle.net"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "xbox.*.microsoft.com"
    - "+.xboxlive.com"
    - "+.market.xboxcn.com"
    # 网络门户检测
    - "captive.apple.com"
    - "connectivitycheck.gstatic.com"
    - "detectportal.firefox.com"
    - "resolver1.opendns.com"
    - "wifi.vivo.com.cn"
    # Google Lens
    - "lens.l.google.com"

# ─── 代理提供者 ────────────────────────────────────────────
# 🔴 请将 url 替换为你的机场订阅链接
proxy-providers:
  MyAirport:
    type: http
    url: "https://example.com/api/v1/client/subscribe?token=YOUR_TOKEN"
    interval: 3600
    path: ./proxies/airport.yaml
    # 过滤信息节点（取消注释按需启用）
    # exclude-filter: "(?i)(到期|剩余|流量|官网|套餐|重置)"
    health-check:
      enable: true
      interval: 600
      url: http://cp.cloudflare.com/generate_204
      lazy: true
    override:
      client-fingerprint: chrome
      skip-cert-verify: true
      udp: true

# ─── 策略组 ────────────────────────────────────────────────
proxy-groups:

  # ── 核心策略 ──

  - name: "🚀 节点选择"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Rocket.png
    proxies:
      - "⚡ 自动选择"
      - "🔧 手动切换"
      - "香港"
      - "台湾"
      - "日本"
      - "新加坡"
      - "美国"
      - "DIRECT"

  - name: "⚡ 自动选择"
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
    use:
      - MyAirport
    url: "http://www.gstatic.com/generate_204"
    interval: 600
    tolerance: 50
    lazy: true

  # ── 专用策略 ──

  # AI 服务（ChatGPT / Claude / Gemini / Copilot 等）
