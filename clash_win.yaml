      - "♻️ 自动选择"
      - "手动切换"
      - "🤖 AI 服务"
      - "🔍 Google"
      - "📹 YouTube"
      - "📲 Telegram"
      - "📚 学术科研"
      - "香港Select"
      - "台湾Select"
      - "日本Select"
      - "新加坡Select"
      - "美国Select"
      - "DIRECT"

  # 2. AI 服务
