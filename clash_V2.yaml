    interval: 600
    tolerance: 50
    lazy: true

  - name: "台湾⚡"
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    use:
      - MyAirport
    filter: "(?i)(TW|Taiwan|台湾|TWN|🇹🇼)"
