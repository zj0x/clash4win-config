# ============================================================
# Clash Verge Rev 配置 (Mihomo 内核)
# 适配：Windows | 地区：中国大陆 | 模式：白名单
# 白名单逻辑：已知国内域名/IP → 直连，其余 → 代理（安全优先）
# 优化版：2026-03-09
# ============================================================

# ─── 基础设置 ───────────────────────────────────────────────
mixed-port: 7890                    # HTTP + SOCKS5 混合端口
allow-lan: false                    # 默认关闭局域网访问，更安全；如需共享给其他设备再改为 true
bind-address: "*"
mode: rule
log-level: info
ipv6: false                         # 关闭 IPv6，降低泄漏与兼容性问题
external-controller: 127.0.0.1:9090
secret: "change-this-to-a-long-random-string"   # 请务必改成你自己的随机长密码

# ─── 内核性能优化 ───────────────────────────────────────────
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 15
find-process-mode: strict

# ─── GeoData 配置 ──────────────────────────────────────────
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24

geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# ─── 持久化 ────────────────────────────────────────────────
profile:
  store-selected: true
  store-fake-ip: true

# ─── TUN 虚拟网卡（接管全部系统流量）─────────────────────────
tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  mtu: 1400                         # 比 1500 在部分网络环境下更稳；若你当前 1500 完全稳定，也可改回
  strict-route: true
  endpoint-independent-nat: true

# ─── 流量嗅探 ──────────────────────────────────────────────
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ─── DNS 配置（核心防污染）─────────────────────────────────
dns:
  enable: true
  # prefer-h3: false                # 官方通常不建议与 respect-rules 同时启用
  listen: 127.0.0.1:1053
  ipv6: false

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  respect-rules: true

  # 引导 DNS（解析 DoH 域名本身）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 代理节点域名解析
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # 直连域名解析
  direct-nameserver:
    - system
  direct-nameserver-follow-policy: true

  # 主 DNS
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query

  # 国内域名策略
  nameserver-policy:
    "geosite:cn,private,apple-cn,apple@cn,steam@cn,category-games@cn":
      - https://223.5.5.5/dns-query
      - https://119.29.29.29/dns-query

  # 以下域名返回真实 IP，不走 fake-ip
  fake-ip-filter:
    # Windows 网络探测
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "dns.msftncsi.com"

    # NTP 时间同步
    - "+.ntp.org.cn"
    - "+.pool.ntp.org"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "ntp.*.com"

    # 局域网 / 本地
    - "+.lan"
    - "+.local"
    - "+.localhost"

    # STUN / NAT 穿透 / WebRTC
    - "+.stun.*.*"
    - "+.stun.*"
    - "stun.*.*"
    - "stun.*"
    - "+.turn.twilio.com"
    - "+.stun.playstation.net"
    - "+.stun.l.google.com"

    # QQ 登录
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"

  # 网易云音乐
    - "+.music.163.com"
    - "music.126.net"

    # 游戏平台
    - "+.battlenet.com.cn"
    - "+.logon.battlenet.com.cn"
    - "+.logon.battle.net"
    - "+.srv.nintendo.net"
    - "xbox.*.microsoft.com"
    - "+.xboxlive.com"
    - "+.market.xboxcn.com"

    # 网络门户检测
    - "captive.apple.com"
    - "connectivitycheck.gstatic.com"
    - "detectportal.firefox.com"
    - "resolver1.opendns.com"
    - "wifi.vivo.com.cn"

    # Google Lens
    - "lens.l.google.com"

# ─── 代理提供者 ────────────────────────────────────────────
# 请将 url 替换为你的机场订阅链接
proxy-providers:
  MyAirport:
    type: http
    url: "https://example.com/api/v1/client/subscribe?token=YOUR_TOKEN"
    interval: 3600
    path: ./proxies/airport.yaml
    # exclude-filter: "(?i)(到期|剩余|流量|官网|套餐|重置)"
    health-check:
      enable: true
      interval: 600
      url: "http://www.gstatic.com/generate_204"
      lazy: true
    override:
      client-fingerprint: chrome
      skip-cert-verify: false
      udp: true

# ─── 策略组 ────────────────────────────────────────────────
proxy-groups:

  # ── 核心策略 ──
  - name: "🚀 节点选择"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Rocket.png
    proxies:
      - "⚡ 自动选择"
      - "🔧 手动切换"
      - "香港"
      - "台湾"
      - "日本"
      - "新加坡"
      - "美国"
      - "DIRECT"

  - name: "⚡ 自动选择"
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
    use:
      - MyAirport
    url: "http://www.gstatic.com/generate_204"
    interval: 600
    tolerance: 50
    lazy: true

  # ── 专用策略 ──
  - name: "🧠 AI 服务"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bot.png
    proxies:
      - "美国"
      - "日本"
      - "新加坡"
      - "台湾"
      - "⚡ 自动选择"
      - "🔧 手动切换"

  - name: "🔍 Google"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png
    proxies:
      - "🚀 节点选择"
      - "香港"
      - "美国"
      - "日本"
      - "新加坡"
      - "🔧 手动切换"

  - name: "📹 YouTube"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
    proxies:
      - "🚀 节点选择"
      - "香港"
      - "日本"
      - "新加坡"
      - "美国"
      - "🔧 手动切换"

  - name: "🐙 GitHub"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png
    proxies:
      - "🔧 手动切换"
      - "日本"
      - "美国"
      - "新加坡"
      - "⚡ 自动选择"

  - name: "📲 Telegram"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    proxies:
      - "🚀 节点选择"
      - "新加坡"
      - "美国"
      - "香港"
      - "日本"
      - "🔧 手动切换"

  - name: "🍎 Apple 服务"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
    proxies:
      - "DIRECT"
      - "🚀 节点选择"

  - name: "🪟 Microsoft 服务"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png
    proxies:
      - "DIRECT"
      - "🚀 节点选择"

  # 兜底：未匹配流量（白名单模式 → 走代理）
  - name: "🐟 漏网之鱼"
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png
    proxies:
      - "🚀 节点选择"
      - "⚡ 自动选择"

  # ── 工具组 ──
